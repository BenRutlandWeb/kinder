services:
  babynames:
    build: .
    ports:
      - "8487:8000"
    volumes:
      - ./data:/data
      - ./sample-data:/sample-data:ro
      - ./frontend:/app/frontend
      - ./app:/app/app
      - ./certs:/certs
    command: ["--reload"]
    environment:
      DATA_DIR: /data
      # Set ENABLE_TLS=1 for PWA install, offline, and native share on LAN IPs.
      ENABLE_TLS: ${ENABLE_TLS:-1}
      TLS_SAN_HOSTS: ${TLS_SAN_HOSTS:-localhost,127.0.0.1}
      BASE_URL: ${BASE_URL:-https://localhost:8487}
    restart: unless-stopped

  import-girls:
    build: .
    profiles: [import]
    volumes:
      - ./data:/data
      - ./sample-data:/sample-data:ro
    environment:
      DATA_DIR: /data
    command: python scripts/import_csv.py /sample-data/babynames1996to2024-Table_1.csv F

  import-boys:
    build: .
    profiles: [import]
    volumes:
      - ./data:/data
      - ./sample-data:/sample-data:ro
    environment:
      DATA_DIR: /data
    command: python scripts/import_csv.py /sample-data/babynames1996to2024-Table_2.csv M

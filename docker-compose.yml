services:
  babynames:
    build: .
    ports:
      - "8487:8000"
    volumes:
      - ./data:/data
      - ./sample-data:/sample-data:ro
      - ./frontend:/app/frontend
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATA_DIR: /data
      BASE_URL: ${BASE_URL:-http://localhost:8487}
    restart: unless-stopped

  import-girls:
    build: .
    profiles: [import]
    volumes:
      - ./data:/data
      - ./sample-data:/sample-data:ro
    environment:
      DATA_DIR: /data
    command: python scripts/import_csv.py /sample-data/babynames1996to2024-Table_1.csv F

  import-boys:
    build: .
    profiles: [import]
    volumes:
      - ./data:/data
      - ./sample-data:/sample-data:ro
    environment:
      DATA_DIR: /data
    command: python scripts/import_csv.py /sample-data/babynames1996to2024-Table_2.csv M
